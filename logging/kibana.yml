# ============================================================
# Kibana — Configuration for RTA-GUARD
# Phase 6.3
# ============================================================

server.name: rta-guard-kibana
server.host: "0.0.0.0"
server.port: 5601

# Elasticsearch connection
elasticsearch.hosts: ["http://elasticsearch:9200"]

# Index pattern for RTA-GUARD logs
kibana.index: ".kibana"

# Disable telemetry
telemetry.enabled: false
telemetry.optIn: false

# Logging
logging:
  appenders:
    file:
      type: file
      fileName: /var/log/kibana/kibana.log
      layout:
        type: json
  root:
    level: info

# Security (disabled for dev)
xpack.security.enabled: false
xpack.encryptedSavedObjects.encryptionKey: "rtaguard-dev-encryption-key-32chars!"
