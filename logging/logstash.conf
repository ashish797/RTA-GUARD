# ============================================================
# Logstash Pipeline — RTA-GUARD log ingestion
# Phase 6.3
#
# Input:  Beats (filebeat) or TCP/JSON from RTA-GUARD
# Filter: Parse JSON, enrich timestamps, categorize events
# Output: Elasticsearch
# ============================================================

input {
  # Receive logs via Filebeat
  beats {
    port => 5044
  }

  # Direct JSON input for testing / sidecar
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Already JSON from structured logging — parse if needed
  if ![level] {
    json {
      source => "message"
      target => "parsed"
    }

    # Flatten parsed fields
    mutate {
      rename => {
        "[parsed][timestamp]"  => "timestamp"
        "[parsed][level]"      => "level"
        "[parsed][message]"    => "log_message"
        "[parsed][module]"     => "module"
        "[parsed][function]"   => "function_name"
        "[parsed][line]"       => "source_line"
        "[parsed][service]"    => "service"
        "[parsed][hostname]"   => "hostname"
        "[parsed][logger]"     => "logger_name"
        "[parsed][request_id]" => "request_id"
        "[parsed][session_id]" => "session_id"
        "[parsed][agent_id]"   => "agent_id"
        "[parsed][correlation_id]" => "correlation_id"
        "[parsed][event_type]" => "event_type"
        "[parsed][rule_id]"    => "rule_id"
        "[parsed][severity]"   => "log_severity"
        "[parsed][result]"     => "check_result"
        "[parsed][duration_ms]" => "duration_ms"
        "[parsed][exception]"  => "exception"
        "[parsed][exception_type]" => "exception_type"
      }
      remove_field => ["parsed"]
    }
  }

  # Parse timestamp
  date {
    match => ["timestamp", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSSSSSZ", "yyyy-MM-dd'T'HH:mm:ssZ"]
    target => "@timestamp"
    timezone => "UTC"
  }

  # Convert numeric fields
  mutate {
    convert => {
      "source_line" => "integer"
      "duration_ms" => "float"
    }
  }

  # Categorize log levels
  if [level] {
    mutate {
      add_field => { "log_level_num" => "0" }
    }
    if [level] == "DEBUG" {
      mutate { replace => { "log_level_num" => "10" } }
    } else if [level] == "INFO" {
      mutate { replace => { "log_level_num" => "20" } }
    } else if [level] == "WARNING" {
      mutate { replace => { "log_level_num" => "30" } }
    } else if [level] == "ERROR" {
      mutate { replace => { "log_level_num" => "40" } }
    } else if [level] == "CRITICAL" {
      mutate { replace => { "log_level_num" => "50" } }
    }
    mutate { convert => { "log_level_num" => "integer" } }
  }

  # Tag kill decisions for easy filtering
  if [event_type] == "kill_decision" {
    mutate { add_tag => ["kill_decision"] }
  }
  if [event_type] == "rule_violation" {
    mutate { add_tag => ["rule_violation"] }
  }
  if [event_type] == "guard_check" {
    mutate { add_tag => ["guard_check"] }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "rta-guard-logs-%{+YYYY.MM.dd}"
    template_name => "rta-guard"
  }

  # Debug output (disable in production)
  # stdout { codec => rubydebug }
}
