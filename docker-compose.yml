# ============================================================
# RTA-GUARD — Full Stack Docker Compose
# Dashboard (Python/FastAPI) + PostgreSQL + Redis + Qdrant
# ============================================================
version: "3.9"

services:
  # ---- RTA-GUARD Dashboard + Guard Engine ----
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rta-guard-dashboard
    ports:
      - "${RTA_PORT:-8080}:8080"
    environment:
      - PYTHONUNBUFFERED=1
      # Database: use Postgres when available, SQLite fallback
      - DATABASE_URL=${DATABASE_URL:-postgresql://rta:rta_secret@postgres:5432/rtaguard}
      # Redis for caching / rate limiting
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      # Qdrant for vector search (Brahmanda)
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      # Auth
      - RTA_SECRET_KEY=${RTA_SECRET_KEY:-change-me-in-production}
      - RTA_AUTH_TOKEN=${RTA_AUTH_TOKEN:-}
      # OpenAI (optional, for embeddings)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Prometheus metrics (opt-in)
      - METRICS_ENABLED=${METRICS_ENABLED:-false}
      # Structured logging (opt-in)
      - LOG_LEVEL=${LOG_LEVEL:-WARNING}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_TO_FILE=${LOG_TO_FILE:-true}
    volumes:
      - ./data/dashboard:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - rta-guard-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---- PostgreSQL (Brahmanda primary store) ----
  postgres:
    image: postgres:16-alpine
    container_name: rta-guard-postgres
    environment:
      POSTGRES_DB: rtaguard
      POSTGRES_USER: rta
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rta_secret}
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - rta-guard-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rta -d rtaguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis (caching, rate limiting, session store) ----
  redis:
    image: redis:7-alpine
    container_name: rta-guard-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - ./data/redis:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - rta-guard-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---- Qdrant (vector database for Brahmanda) ----
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: rta-guard-qdrant
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    networks:
      - rta-guard-net
    restart: unless-stopped

  # ---- Prometheus (metrics collection) ----
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: rta-guard-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./data/prometheus:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - rta-guard-net
    depends_on:
      dashboard:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---- Grafana (observability dashboards) ----
  grafana:
    image: grafana/grafana:10.4.1
    container_name: rta-guard-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-rta-guard-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/dashboard.json
    volumes:
      - ./monitoring/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./monitoring/grafana/dashboard-provider.yml:/etc/grafana/provisioning/dashboards/dashboard-provider.yml:ro
      - ./monitoring/grafana/dashboard.json:/var/lib/grafana/dashboards/dashboard.json:ro
      - ./data/grafana:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - rta-guard-net
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---- Elasticsearch (log storage & search) ----
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: rta-guard-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - ./logging/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - ./data/elasticsearch:/usr/share/elasticsearch/data
    ports:
      - "${ES_PORT:-9200}:9200"
    networks:
      - rta-guard-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---- Logstash (log ingestion pipeline) ----
  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: rta-guard-logstash
    volumes:
      - ./logging/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./logging/pipeline.yml:/usr/share/logstash/config/pipelines.yml:ro
    ports:
      - "${LOGSTASH_BEATS_PORT:-5044}:5044"
      - "${LOGSTASH_TCP_PORT:-5000}:5000"
    networks:
      - rta-guard-net
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9600/_node/stats || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---- Kibana (log visualization) ----
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: rta-guard-kibana
    volumes:
      - ./logging/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    networks:
      - rta-guard-net
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

networks:
  rta-guard-net:
    driver: bridge
    name: rta-guard-net
