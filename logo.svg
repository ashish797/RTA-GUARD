<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradients -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#FF8C00;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#FF4500;stop-opacity:0.7" />
    </radialGradient>
    <radialGradient id="shieldBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#1a1a3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="goldRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700" />
      <stop offset="50%" style="stop-color:#FFA500" />
      <stop offset="100%" style="stop-color:#FFD700" />
    </linearGradient>
    <linearGradient id="bladeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0.9" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Shield Shape -->
  <path d="M256 20 L460 120 L460 300 Q460 420 256 492 Q52 420 52 300 L52 120 Z"
        fill="url(#shieldBg)" stroke="#FFD700" stroke-width="3" opacity="0.95"/>
  <path d="M256 32 L450 126 L450 296 Q450 412 256 480 Q62 412 62 296 L62 126 Z"
        fill="none" stroke="#FFD700" stroke-width="1" opacity="0.3"/>

  <!-- Outer Mandala Ring (16 segments) -->
  <g transform="translate(256,256)" filter="url(#glow)">
    <circle cx="0" cy="0" r="180" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="170" fill="none" stroke="#FF8C00" stroke-width="1" opacity="0.4"/>
    <!-- Mandala petals -->
    <g id="petal">
      <ellipse cx="0" cy="-155" rx="18" ry="40" fill="none" stroke="#FFD700" stroke-width="1.5" opacity="0.7"/>
      <ellipse cx="0" cy="-148" rx="10" ry="25" fill="#FFD700" opacity="0.15"/>
    </g>
    <use href="#petal" transform="rotate(22.5)"/>
    <use href="#petal" transform="rotate(45)"/>
    <use href="#petal" transform="rotate(67.5)"/>
    <use href="#petal" transform="rotate(90)"/>
    <use href="#petal" transform="rotate(112.5)"/>
    <use href="#petal" transform="rotate(135)"/>
    <use href="#petal" transform="rotate(157.5)"/>
    <use href="#petal" transform="rotate(180)"/>
    <use href="#petal" transform="rotate(202.5)"/>
    <use href="#petal" transform="rotate(225)"/>
    <use href="#petal" transform="rotate(247.5)"/>
    <use href="#petal" transform="rotate(270)"/>
    <use href="#petal" transform="rotate(292.5)"/>
    <use href="#petal" transform="rotate(315)"/>
    <use href="#petal" transform="rotate(337.5)"/>
  </g>

  <!-- Sudarshan Chakra (Spinning Discus) - Main Ring -->
  <g transform="translate(256,256)" filter="url(#strongGlow)">
    <!-- Outer chakra ring -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="url(#goldRing)" stroke-width="8"/>
    <circle cx="0" cy="0" r="110" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="130" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.5"/>

    <!-- Chakra blades (8 blades) -->
    <g id="blade">
      <path d="M0,-115 L8,-40 L0,-25 L-8,-40 Z" fill="url(#bladeGrad)" opacity="0.9"/>
    </g>
    <use href="#blade" transform="rotate(45)"/>
    <use href="#blade" transform="rotate(90)"/>
    <use href="#blade" transform="rotate(135)"/>
    <use href="#blade" transform="rotate(180)"/>
    <use href="#blade" transform="rotate(225)"/>
    <use href="#blade" transform="rotate(270)"/>
    <use href="#blade" transform="rotate(315)"/>

    <!-- Inner chakra details -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#FFD700" stroke-width="3"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#FF8C00" stroke-width="2" opacity="0.8"/>

    <!-- Small dots on inner ring -->
    <g id="dot">
      <circle cx="0" cy="-70" r="4" fill="#FFD700"/>
    </g>
    <use href="#dot" transform="rotate(30)"/>
    <use href="#dot" transform="rotate(60)"/>
    <use href="#dot" transform="rotate(90)"/>
    <use href="#dot" transform="rotate(120)"/>
    <use href="#dot" transform="rotate(150)"/>
    <use href="#dot" transform="rotate(180)"/>
    <use href="#dot" transform="rotate(210)"/>
    <use href="#dot" transform="rotate(240)"/>
    <use href="#dot" transform="rotate(270)"/>
    <use href="#dot" transform="rotate(300)"/>
    <use href="#dot" transform="rotate(330)"/>
  </g>

  <!-- Center Om/Core -->
  <g transform="translate(256,256)" filter="url(#strongGlow)">
    <!-- Glowing core -->
    <circle cx="0" cy="0" r="35" fill="url(#coreGlow)" opacity="0.9"/>
    <circle cx="0" cy="0" r="28" fill="#1a1a3e"/>

    <!-- Simplified Om symbol -->
    <text x="0" y="10" text-anchor="middle" font-family="serif" font-size="36"
          fill="#FFD700" font-weight="bold" filter="url(#glow)">ॐ</text>
  </g>

  <!-- 13 Rule Stars (orbiting the chakra) -->
  <g transform="translate(256,256)" filter="url(#glow)">
    <g id="star">
      <polygon points="0,-145 3,-138 10,-138 4,-133 7,-126 0,-130 -7,-126 -4,-133 -10,-138 -3,-138"
               fill="#FFD700" opacity="0.8"/>
    </g>
    <use href="#star" transform="rotate(27.7)"/>
    <use href="#star" transform="rotate(55.4)"/>
    <use href="#star" transform="rotate(83.1)"/>
    <use href="#star" transform="rotate(110.8)"/>
    <use href="#star" transform="rotate(138.5)"/>
    <use href="#star" transform="rotate(166.2)"/>
    <use href="#star" transform="rotate(193.8)"/>
    <use href="#star" transform="rotate(221.5)"/>
    <use href="#star" transform="rotate(249.2)"/>
    <use href="#star" transform="rotate(276.9)"/>
    <use href="#star" transform="rotate(304.6)"/>
    <use href="#star" transform="rotate(332.3)"/>
  </g>

  <!-- Binary/data streams flowing around the shield -->
  <g opacity="0.3" fill="#00BFFF" font-family="monospace" font-size="8">
    <text x="80" y="200">01001101</text>
    <text x="380" y="180">11010010</text>
    <text x="100" y="380">00110101</text>
    <text x="360" y="400">10101100</text>
    <text x="60" y="280">01100110</text>
    <text x="420" y="300">11001001</text>
  </g>

  <!-- Text: RTA-GUARD -->
  <text x="256" y="520" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="32" font-weight="bold" fill="#FFD700" letter-spacing="6"
        filter="url(#glow)">RTA-GUARD</text>
  <text x="256" y="545" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="11" fill="#FFD700" opacity="0.7" letter-spacing="3">COSMIC ORDER ENFORCED</text>
</svg>
