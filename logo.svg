<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 560" width="512" height="560">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFBFC"/>
      <stop offset="100%" style="stop-color:#F0F2F5"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A017"/>
      <stop offset="30%" style="stop-color:#C4900A"/>
      <stop offset="70%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#D4A017"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8B820"/>
      <stop offset="50%" style="stop-color:#D4A017"/>
      <stop offset="100%" style="stop-color:#C4900A"/>
    </linearGradient>
    <linearGradient id="bladeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4A017;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#E8B820;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#D4A017;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="bladeGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C4900A;stop-opacity:0.4"/>
      <stop offset="50%" style="stop-color:#D4A017;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#C4900A;stop-opacity:0.4"/>
    </linearGradient>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFAED"/>
      <stop offset="50%" style="stop-color:#F5E6B8"/>
      <stop offset="100%" style="stop-color:#E8D5A0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#8B7355" flood-opacity="0.15"/>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#8B7355" flood-opacity="0.12"/>
    </filter>
    <clipPath id="shieldClip">
      <path d="M256 28 L448 120 L448 280 Q448 400 256 468 Q64 400 64 280 L64 120 Z"/>
    </clipPath>
  </defs>

  <!-- ========== SHIELD BODY (LIGHT) ========== -->
  <path d="M256 28 L448 120 L448 280 Q448 400 256 468 Q64 400 64 280 L64 120 Z"
        fill="url(#shieldGrad)" filter="url(#softShadow)"/>
  <path d="M256 28 L448 120 L448 280 Q448 400 256 468 Q64 400 64 280 L64 120 Z"
        fill="none" stroke="url(#goldGrad)" stroke-width="2.5"/>
  <path d="M256 42 L436 128 L436 276 Q436 390 256 454 Q76 390 76 276 L76 128 Z"
        fill="none" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.35"/>

  <!-- ========== MANDALA PETALS ========== -->
  <g clip-path="url(#shieldClip)">
    <g transform="translate(256,252)">
      <circle cx="0" cy="0" r="185" fill="none" stroke="#D4A017" stroke-width="1" opacity="0.2"/>
      <circle cx="0" cy="0" r="175" fill="none" stroke="#C4900A" stroke-width="0.8" opacity="0.15"/>
      <g id="petal">
        <path d="M0,-170 Q12,-145 0,-125 Q-12,-145 0,-170" fill="#D4A017" opacity="0.08" stroke="#D4A017" stroke-width="0.7" stroke-opacity="0.25"/>
      </g>
      <use href="#petal" transform="rotate(22.5)"/>
      <use href="#petal" transform="rotate(45)"/>
      <use href="#petal" transform="rotate(67.5)"/>
      <use href="#petal" transform="rotate(90)"/>
      <use href="#petal" transform="rotate(112.5)"/>
      <use href="#petal" transform="rotate(135)"/>
      <use href="#petal" transform="rotate(157.5)"/>
      <use href="#petal" transform="rotate(180)"/>
      <use href="#petal" transform="rotate(202.5)"/>
      <use href="#petal" transform="rotate(225)"/>
      <use href="#petal" transform="rotate(247.5)"/>
      <use href="#petal" transform="rotate(270)"/>
      <use href="#petal" transform="rotate(292.5)"/>
      <use href="#petal" transform="rotate(315)"/>
      <use href="#petal" transform="rotate(337.5)"/>
    </g>
  </g>

  <!-- ========== SUDARSHAN CHAKRA ========== -->
  <g transform="translate(256,252)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="120" fill="none" stroke="url(#goldGrad2)" stroke-width="4"/>
    <circle cx="0" cy="0" r="128" fill="none" stroke="#D4A017" stroke-width="0.8" opacity="0.2"/>
    <circle cx="0" cy="0" r="112" fill="none" stroke="#D4A017" stroke-width="0.8" opacity="0.2"/>

    <!-- 8 main blades -->
    <g id="blade">
      <path d="M0,-118 C6,-95 7,-60 0,-30 C-7,-60 -6,-95 0,-118" fill="url(#bladeGrad)"/>
      <line x1="0" y1="-115" x2="0" y2="-35" stroke="#E8B820" stroke-width="0.4" opacity="0.5"/>
    </g>
    <use href="#blade" transform="rotate(45)"/>
    <use href="#blade" transform="rotate(90)"/>
    <use href="#blade" transform="rotate(135)"/>
    <use href="#blade" transform="rotate(180)"/>
    <use href="#blade" transform="rotate(225)"/>
    <use href="#blade" transform="rotate(270)"/>
    <use href="#blade" transform="rotate(315)"/>

    <!-- 8 secondary blades -->
    <g id="blade2">
      <path d="M0,-112 C4,-90 4,-65 0,-40 C-4,-65 -4,-90 0,-112" fill="url(#bladeGrad2)"/>
    </g>
    <use href="#blade2" transform="rotate(22.5)"/>
    <use href="#blade2" transform="rotate(67.5)"/>
    <use href="#blade2" transform="rotate(112.5)"/>
    <use href="#blade2" transform="rotate(157.5)"/>
    <use href="#blade2" transform="rotate(202.5)"/>
    <use href="#blade2" transform="rotate(247.5)"/>
    <use href="#blade2" transform="rotate(292.5)"/>
    <use href="#blade2" transform="rotate(337.5)"/>

    <circle cx="0" cy="0" r="80" fill="none" stroke="url(#goldGrad2)" stroke-width="2"/>

    <!-- Dot ring -->
    <g id="dotRing">
      <circle cx="0" cy="-70" r="2.5" fill="#D4A017"/>
      <circle cx="0" cy="-60" r="1.5" fill="#C4900A" opacity="0.5"/>
    </g>
    <use href="#dotRing" transform="rotate(30)"/>
    <use href="#dotRing" transform="rotate(60)"/>
    <use href="#dotRing" transform="rotate(90)"/>
    <use href="#dotRing" transform="rotate(120)"/>
    <use href="#dotRing" transform="rotate(150)"/>
    <use href="#dotRing" transform="rotate(180)"/>
    <use href="#dotRing" transform="rotate(210)"/>
    <use href="#dotRing" transform="rotate(240)"/>
    <use href="#dotRing" transform="rotate(270)"/>
    <use href="#dotRing" transform="rotate(300)"/>
    <use href="#dotRing" transform="rotate(330)"/>

    <circle cx="0" cy="0" r="50" fill="none" stroke="#C4900A" stroke-width="1" opacity="0.35"/>
  </g>

  <!-- ========== CENTER OM ========== -->
  <g transform="translate(256,252)">
    <circle cx="0" cy="0" r="36" fill="url(#coreGrad)"/>
    <circle cx="0" cy="0" r="28" fill="#FAFBFC" stroke="#D4A017" stroke-width="1"/>
    <text x="0" y="12" text-anchor="middle" font-family="serif" font-size="36"
          fill="#B8860B" font-weight="bold">ॐ</text>
  </g>

  <!-- ========== 13 RULE STARS ========== -->
  <g transform="translate(256,252)">
    <g id="ruleStar">
      <polygon points="0,-148 3,-141 10,-141 5,-136 7,-129 0,-133 -7,-129 -5,-136 -10,-141 -3,-141"
               fill="#D4A017" opacity="0.55"/>
    </g>
    <use href="#ruleStar" transform="rotate(27.69)"/>
    <use href="#ruleStar" transform="rotate(55.38)"/>
    <use href="#ruleStar" transform="rotate(83.08)"/>
    <use href="#ruleStar" transform="rotate(110.77)"/>
    <use href="#ruleStar" transform="rotate(138.46)"/>
    <use href="#ruleStar" transform="rotate(166.15)"/>
    <use href="#ruleStar" transform="rotate(193.85)"/>
    <use href="#ruleStar" transform="rotate(221.54)"/>
    <use href="#ruleStar" transform="rotate(249.23)"/>
    <use href="#ruleStar" transform="rotate(276.92)"/>
    <use href="#ruleStar" transform="rotate(304.62)"/>
    <use href="#ruleStar" transform="rotate(332.31)"/>
  </g>

  <!-- ========== TITLE ========== -->
  <text x="256" y="508" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="36" font-weight="700" fill="#8B6914" letter-spacing="8">RTA-GUARD</text>
  <text x="256" y="532" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="10" fill="#A0892C" opacity="0.7" letter-spacing="4" font-weight="500">COSMIC ORDER  ·  AI GOVERNANCE  ·  ENTERPRISE SECURITY</text>
</svg>
