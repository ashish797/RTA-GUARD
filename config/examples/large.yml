# RTA-GUARD — Large Deployment Example

# Full HA, multi-region, autoscaling, all features enabled
# Suitable for: enterprise scale, 10K+ API calls/min, compliance requirements

global:
  environment: production
  logLevel: info
  region: us-east-1
  replicaRegions:
    - us-west-2
    - eu-west-1
    - ap-southeast-1
  tags:
    team: platform-security
    costCenter: engineering
    compliance: soc2,hipaa

# --- Components ---
discus:
  replicas: 5
  resources:
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values: ["discus"]
          topologyKey: kubernetes.io/hostname
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app: discus
  env:
    DISCUS_THREAD_POOL: 16
    DISCUS_BATCH_SIZE: 100

brahmanda:
  enabled: true
  replicas: 3
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  cache:
    enabled: true
    type: redis
    ttl: 3600
    maxEntries: 100000

conscience:
  enabled: true
  replicas: 3
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  profiling:
    enabled: true
    baselineWindow: 7d
    driftThreshold: 0.15
    alertOnDrift: true

enterprise:
  enabled: true
  rbac:
    enabled: true
    roles:
      - name: operator
        permissions: [rules:read, rules:reload, metrics:read, events:read]
      - name: admin
        permissions: ["*"]
      - name: viewer
        permissions: [metrics:read, events:read]
      - name: security-lead
        permissions: [rules:*, events:*, metrics:*, dr:*, backup:*]
  sso:
    enabled: true
    provider: oidc
    issuer: https://auth.example.com
    clientId: rta-guard
    scopes: [openid, profile, email]
  tenancy:
    enabled: true
    maxTenants: 500
    isolation: namespace
  rateLimiting:
    enabled: true
    defaultRpm: 5000
    perTenantOverrides: true
  webhooks:
    enabled: true
    endpoints:
      - url: https://hooks.slack.com/services/XXX
        events: [session.killed, sla.violation]
      - url: https://events.pagerduty.com/v2/enqueue
        events: [ha.failover, ha.split_brain]
  sla:
    enabled: true
    uptimeTarget: 99.99
    latencyP99: 50ms
    errorBudgetPolicy: freeze

# --- Database ---
database:
  type: postgresql
  host: pg-pooler.rta-guard.svc
  port: 6432          # PgBouncer
  name: rtaguard
  ssl: true
  sslMode: verify-full
  pool:
    minSize: 10
    maxSize: 50
  replicas:
    enabled: true
    count: 2
    host: pg-pooler-ro.rta-guard.svc
  backup:
    walArchiving: true
    continuousBackup: true
    retention: 90d

# --- Cache ---
redis:
  enabled: true
  mode: cluster
  cluster:
    nodes:
      - redis-0.rta-guard.svc:6379
      - redis-1.rta-guard.svc:6379
      - redis-2.rta-guard.svc:6379
      - redis-3.rta-guard.svc:6379
      - redis-4.rta-guard.svc:6379
      - redis-5.rta-guard.svc:6379
    replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi
  persistence:
    enabled: true
    size: 20Gi

# --- Networking ---
ingress:
  enabled: true
  className: nginx
  host: rta.example.com
  tls:
    enabled: true
    secretName: rta-tls-production
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/rate-limit: "5000"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
  geoRouting:
    enabled: true
    defaultRegion: us-east-1
    rules:
      - region: eu-west-1
        countries: [GB, DE, FR, IT, ES, NL, BE, AT, CH]
      - region: ap-southeast-1
        countries: [IN, SG, AU, NZ, JP, KR, TH, ID, MY]

service:
  type: ClusterIP
  port: 8080
  grpcPort: 9090

networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress
      ports:
        - port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: rta-guard
      ports:
        - port: 5432
        - port: 6379

# --- Rules ---
rules:
  source: defaults
  customRulesPath: /etc/rta-guard/custom-rules/
  hotReload: true
  validation:
    enabled: true
    strictMode: true
    ciCheck: true          # Rules must pass CI before deploy
  audit:
    enabled: true
    logChanges: true
    requireApproval: true   # Rule changes require admin approval

# --- Monitoring ---
monitoring:
  prometheus:
    enabled: true
    scrapeInterval: 10s
    retention: 90d
    remoteWrite:
      enabled: true
      url: https://mimir.example.com/api/v1/push
  grafana:
    enabled: true
    dashboards:
      - rta-overview
      - rta-rules
      - rta-ha
      - rta-cost
      - rta-conscience
      - rta-sla
    alerts:
      enabled: true
      notificationChannels: [slack, pagerduty]
  logging:
    driver: json
    level: info
    retention: 90d
    structured: true
    correlationId: true
  tracing:
    enabled: true
    provider: jaeger
    sampleRate: 0.1
    endpoint: http://jaeger-collector:14268/api/traces

# --- HA ---
ha:
  enabled: true
  leaderElection:
    enabled: true
    leaseName: rta-guard-leader
    leaseDuration: 10s
    renewDeadline: 5s
  splitBrain:
    detection: true
    quorum: 3
    action: shutdown_minority
  failover:
    enabled: true
    timeout: 15s
    automaticFailback: true
    healthCheck:
      interval: 5s
      timeout: 3s
      threshold: 3

# --- Replication ---
replication:
  enabled: true
  mode: semi-sync           # Semi-synchronous for stronger consistency
  peers:
    - region: us-west-2
      url: https://rta-west.internal:8443
      priority: 1
    - region: eu-west-1
      url: https://rta-eu.internal:8443
      priority: 2
    - region: ap-southeast-1
      url: https://rta-ap.internal:8443
      priority: 3
  syncInterval: 2s
  maxLag: 5s
  conflictResolution: last-write-wins

# --- Backup ---
backup:
  enabled: true
  schedule: "0 */6 * * *"    # Every 6 hours
  retention: 90
  destination:
    type: s3
    bucket: rta-guard-backups-production
    region: us-east-1
    crossRegionReplication:
      enabled: true
      targetBucket: rta-guard-backups-dr
      targetRegion: eu-west-1
  components:
    - database
    - rules
    - config
    - brahmanda
    - conscience
  verification:
    enabled: true
    schedule: "0 6 * * 1"    # Weekly restore test on Monday 6 AM
    targetEnv: staging

# --- Disaster Recovery ---
disasterRecovery:
  enabled: true
  rpo: 1h
  rto: 15m
  primaryRegion: us-east-1
  drRegion: eu-west-1
  autoPromoteStandby: true

# --- Autoscaling ---
autoscaling:
  enabled: true
  minReplicas: 5
  maxReplicas: 20
  metrics:
    - type: cpu
      target: 60
    - type: memory
      target: 70
    - type: custom
      metric: rta_requests_per_second
      target: 5000
  behavior:
    scaleUp:
      stabilizationWindow: 60s
      percent: 50
      pods: 5
    scaleDown:
      stabilizationWindow: 300s
      percent: 10
      pods: 2

# --- Security ---
security:
  tls:
    enabled: true
    minVersion: "1.3"
    certManager:
      enabled: true
      issuer: letsencrypt-prod
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  containerSecurityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
  secrets:
    provider: vault
    vaultPath: secret/rta-guard/production
    autoRotate: true
    rotationInterval: 30d
  audit:
    enabled: true
    logLevel: RequestResponse
    retention: 365d

# --- Storage ---
persistence:
  enabled: true
  size: 50Gi
  storageClass: gp3
  encryption:
    enabled: true
    kmsKeyId: arn:aws:kms:us-east-1:ACCOUNT:key/KEY-ID
