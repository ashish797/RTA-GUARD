# RTA-GUARD — Small Deployment Example

# Single-node, minimal resources
# Suitable for: development, testing, small teams (< 100 API calls/min)

global:
  environment: development
  logLevel: info

# --- Components ---
discus:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

brahmanda:
  enabled: false            # Skip ground truth verification in dev

conscience:
  enabled: false            # Skip behavioral profiling in dev

enterprise:
  enabled: false            # No RBAC/SSO/tenancy

# --- Database ---
database:
  type: sqlite              # File-based, no PostgreSQL needed
  path: /app/data/rtaguard.db

# --- Cache ---
redis:
  enabled: false            # No Redis needed for single-node dev

# --- Networking ---
ingress:
  enabled: false
service:
  type: NodePort
  port: 8080

# --- Rules ---
rules:
  source: defaults          # Use built-in rules (R1–R13)
  customRulesPath: null

# --- Monitoring ---
monitoring:
  prometheus:
    enabled: false
  grafana:
    enabled: false
  logging:
    driver: stdout

# --- HA ---
ha:
  enabled: false

# --- Backup ---
backup:
  enabled: false
  schedule: null

# --- Autoscaling ---
autoscaling:
  enabled: false

# --- Storage ---
persistence:
  enabled: true
  size: 1Gi
  storageClass: standard
