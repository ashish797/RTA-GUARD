# ============================================================
# RTA-GUARD Helm Chart — Default Values
# ============================================================

replicaCount: 1

image:
  repository: rtaguard/dashboard
  tag: "0.6.1"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ---- Service Account ----
serviceAccount:
  create: true
  annotations: {}
  name: ""

# ---- Pod Security ----
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# ---- Service ----
service:
  type: ClusterIP
  port: 8080

# ---- Ingress ----
ingress:
  enabled: false
  className: nginx
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: rta-guard.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: rta-guard-tls
  #    hosts:
  #      - rta-guard.example.com

# ---- Resources ----
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

# ---- Autoscaling ----
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 80

# ---- Persistence ----
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 5Gi

# ---- Environment Variables ----
env:
  PYTHONUNBUFFERED: "1"
  # Set via secrets in production
  # DATABASE_URL: "postgresql://rta:secret@postgres:5432/rtaguard"
  # REDIS_URL: "redis://redis:6379/0"
  # QDRANT_URL: "http://qdrant:6333"

# ---- Secrets (base64-encoded values) ----
secrets: {}
  # RTA_SECRET_KEY: "change-me"
  # RTA_AUTH_TOKEN: ""
  # POSTGRES_PASSWORD: "rta_secret"
  # OPENAI_API_KEY: ""

# ---- PostgreSQL (optional subchart) ----
postgresql:
  enabled: true
  auth:
    username: rta
    password: rta_secret
    database: rtaguard
  primary:
    persistence:
      size: 10Gi

# ---- Redis (optional subchart) ----
redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      size: 2Gi

# ---- Qdrant (optional subchart) ----
qdrant:
  enabled: true
  persistence:
    size: 10Gi

# ---- Probes ----
livenessProbe:
  httpGet:
    path: /api/health
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# ---- Node Selection ----
nodeSelector: {}
tolerations: []
affinity: {}
