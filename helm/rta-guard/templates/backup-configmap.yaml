{{- if .Values.backup.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rta-guard.fullname" . }}-backup-config
  labels:
    {{- include "rta-guard.labels" . | nindent 4 }}
    {{- with .Values.backup.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.backup.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  BACKUP_FULL_SCHEDULE: {{ .Values.backup.fullSchedule | quote }}
  BACKUP_INCREMENTAL_SCHEDULE: {{ .Values.backup.incrementalSchedule | quote }}
  BACKUP_STORAGE_PATH: {{ .Values.backup.storagePath | quote }}
  BACKUP_RETENTION_DAYS: {{ .Values.backup.retentionDays | quote }}
  BACKUP_ENCRYPTION_ENABLED: {{ .Values.backup.encryptionEnabled | quote }}
{{- end }}
