{{- if .Values.backup.enabled }}
---
# =============================================================
# Full Backup CronJob — runs daily at 2 AM by default
# =============================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "rta-guard.fullname" . }}-backup-full
  labels:
    {{- include "rta-guard.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup-full
    {{- with .Values.backup.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.backup.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  schedule: {{ .Values.backup.fullSchedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 7200
      template:
        metadata:
          labels:
            {{- include "rta-guard.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: backup-full
        spec:
          restartPolicy: OnFailure
          {{- with .Values.backup.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backup.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: backup-full
              image: "{{ .Values.backup.image.repository }}:{{ .Values.backup.image.tag }}"
              imagePullPolicy: {{ .Values.backup.image.pullPolicy }}
              command:
                - python
                - -m
                - brahmanda.backup
                - --type
                - full
                - --storage-path
                - "$(BACKUP_STORAGE_PATH)"
                - --retention-days
                - "$(BACKUP_RETENTION_DAYS)"
                {{- if .Values.backup.encryptionEnabled }}
                - --encrypt
                {{- end }}
              envFrom:
                - configMapRef:
                    name: {{ include "rta-guard.fullname" . }}-backup-config
              {{- with .Values.backup.extraEnv }}
              env:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              resources:
                {{- toYaml .Values.backup.resources | nindent 16 }}
              volumeMounts:
                - name: backup-storage
                  mountPath: {{ .Values.backup.storagePath }}
          volumes:
            - name: backup-storage
              {{- if .Values.backup.pvc.enabled }}
              persistentVolumeClaim:
                claimName: {{ include "rta-guard.fullname" . }}-backup
              {{- else }}
              emptyDir: {}
              {{- end }}
---
# =============================================================
# Incremental Backup CronJob — runs every 6 hours by default
# =============================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "rta-guard.fullname" . }}-backup-incremental
  labels:
    {{- include "rta-guard.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup-incremental
    {{- with .Values.backup.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.backup.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  schedule: {{ .Values.backup.incrementalSchedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            {{- include "rta-guard.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: backup-incremental
        spec:
          restartPolicy: OnFailure
          {{- with .Values.backup.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backup.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: backup-incremental
              image: "{{ .Values.backup.image.repository }}:{{ .Values.backup.image.tag }}"
              imagePullPolicy: {{ .Values.backup.image.pullPolicy }}
              command:
                - python
                - -m
                - brahmanda.backup
                - --type
                - incremental
                - --storage-path
                - "$(BACKUP_STORAGE_PATH)"
                - --retention-days
                - "$(BACKUP_RETENTION_DAYS)"
                {{- if .Values.backup.encryptionEnabled }}
                - --encrypt
                {{- end }}
              envFrom:
                - configMapRef:
                    name: {{ include "rta-guard.fullname" . }}-backup-config
              {{- with .Values.backup.extraEnv }}
              env:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              resources:
                {{- toYaml .Values.backup.resources | nindent 16 }}
              volumeMounts:
                - name: backup-storage
                  mountPath: {{ .Values.backup.storagePath }}
          volumes:
            - name: backup-storage
              {{- if .Values.backup.pvc.enabled }}
              persistentVolumeClaim:
                claimName: {{ include "rta-guard.fullname" . }}-backup
              {{- else }}
              emptyDir: {}
              {{- end }}
{{- end }}
