{{- if and .Values.backup.enabled .Values.backup.pvc.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "rta-guard.fullname" . }}-backup
  labels:
    {{- include "rta-guard.labels" . | nindent 4 }}
    {{- with .Values.backup.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.backup.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    {{- toYaml .Values.backup.pvc.accessModes | nindent 4 }}
  {{- if .Values.backup.pvc.storageClass }}
  storageClassName: {{ .Values.backup.pvc.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.backup.pvc.size | quote }}
{{- end }}
