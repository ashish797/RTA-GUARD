# RTA-GUARD Helm Chart — values.yaml

# -- Global settings
replicaCount: 1

image:
  repository: rta-guard
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}

# ============================================================
# Backup & Disaster Recovery (Phase 6.7)
# ============================================================
backup:
  # -- Enable backup CronJobs, PVC, and ConfigMap
  enabled: false

  # -- Image used by backup/restore CronJob containers
  image:
    repository: rta-guard
    tag: latest
    pullPolicy: IfNotPresent

  # -- Full backup schedule (cron syntax). Default: daily at 2 AM
  fullSchedule: "0 2 * * *"

  # -- Incremental backup schedule (cron syntax). Default: every 6 hours
  incrementalSchedule: "0 */6 * * *"

  # -- Backup retention: number of days to keep old backups
  retentionDays: 30

  # -- Enable AES-256 encryption for backup archives
  encryptionEnabled: true

  # -- Path inside the container where backups are stored
  storagePath: "/data/backups"

  # -- PersistentVolumeClaim for backup storage
  pvc:
    enabled: true
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 50Gi

  # -- Resource limits for backup CronJob pods
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # -- Extra environment variables for backup containers
  extraEnv: []

  # -- Node selector for backup pods
  nodeSelector: {}

  # -- Tolerations for backup pods
  tolerations: []

  # -- Annotations added to CronJob metadata
  annotations: {}

  # -- Labels added to all backup resources
  labels: {}
