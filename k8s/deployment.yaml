apiVersion: apps/v1
kind: Deployment
metadata:
  name: rta-guard
  labels:
    app: rta-guard
    app.kubernetes.io/name: rta-guard
    app.kubernetes.io/version: "0.6.1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rta-guard
  template:
    metadata:
      labels:
        app: rta-guard
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: rta-guard
          image: rtaguard/dashboard:0.6.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: rta-guard-config
            - secretRef:
                name: rta-guard-secrets
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rta-guard-data
