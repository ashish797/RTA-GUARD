name: RTA-GUARD WASM Build & Test

on:
  push:
    branches: [main]
    paths:
      - 'discus-rs/**'
      - '.github/workflows/wasm.yml'
  pull_request:
    branches: [main]
    paths:
      - 'discus-rs/**'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: Build WASM + Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: discus-rs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            discus-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('discus-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run native tests
        run: cargo test --verbose

      - name: Build WASM release
        run: cargo build --target wasm32-unknown-unknown --release --verbose

      - name: Check WASM binary size
        run: |
          WASM_FILE="target/wasm32-unknown-unknown/release/discus_rs.wasm"
          if [ ! -f "$WASM_FILE" ]; then
            echo "❌ WASM binary not found"
            exit 1
          fi
          SIZE_BYTES=$(stat -c%s "$WASM_FILE")
          SIZE_KB=$((SIZE_BYTES / 1024))
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
          echo "📦 WASM size: ${SIZE_KB} KB (${SIZE_MB} MB)"
          if [ "$SIZE_BYTES" -gt 2097152 ]; then
            echo "⚠️ WARNING: WASM binary exceeds 2MB target"
          else
            echo "✅ Under 2MB target"
          fi
          echo "WASM_SIZE_KB=${SIZE_KB}" >> $GITHUB_ENV
          echo "WASM_SIZE_MB=${SIZE_MB}" >> $GITHUB_ENV

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: discus-rs-wasm
          path: discus-rs/target/wasm32-unknown-unknown/release/discus_rs.wasm
          if-no-files-found: error
          retention-days: 30

      - name: Upload browser test
        uses: actions/upload-artifact@v4
        with:
          name: browser-test
          path: discus-rs/tests/browser_test.html
          retention-days: 30

      - name: Build summary
        run: |
          echo "## 🛡️ RTA-GUARD WASM Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| WASM Size | ${WASM_SIZE_KB} KB (${WASM_SIZE_MB} MB) |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | wasm32-unknown-unknown |" >> $GITHUB_STEP_SUMMARY
          echo "| Profile | release (opt-level=s, LTO) |" >> $GITHUB_STEP_SUMMARY
          echo "| Binary | \`discus_rs.wasm\` |" >> $GITHUB_STEP_SUMMARY
